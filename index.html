<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Professional Horoscope Creator</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --dark: #2d2d2d; --bg: #f8f9fa; }
        body { font-family: 'Noto Serif JP', serif; background-color: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 30px; }
        .panel { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); max-width: 450px; width: 100%; margin-bottom: 30px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0 18px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--dark); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; transition: 0.3s; }
        button:hover { background: var(--gold); }
        #canvas-wrapper { display: none; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
        canvas { max-width: 100%; height: auto; border: 1px solid #eee; }
        .save-btn { margin-top: 15px; background: var(--gold); width: auto; padding: 10px 40px; }
    </style>
</head>
<body>

<div class="panel">
    <h2 style="text-align:center; font-weight:300; letter-spacing:3px;">HOROSCOPE</h2>
    <label>生年月日</label><input type="date" id="date" value="1978-01-22">
    <label>誕生時間</label><input type="time" id="time" value="18:00">
    <label>出生地（都道府県）</label>
    <select id="place">
        <option value="139.7,35.7">東京都 (139E46, 35N40)</option>
        <option value="135.5,34.7">大阪府</option>
        <option value="141.3,43.0">北海道</option>
        <option value="130.4,33.6">福岡県</option>
    </select>
    <button onclick="draw()">チャートを生成</button>
</div>

<div id="canvas-wrapper">
    <canvas id="cvs" width="1000" height="1000"></canvas><br>
    <button class="save-btn" onclick="save()">画像を保存する</button>
</div>

<script>
const signs = [
    {n:"牡羊座", s:"♈", c:"#F8A191"}, {n:"牡牛座", s:"♉", c:"#F8E58C"}, {n:"双子座", s:"♊", c:"#E9F88C"},
    {n:"蟹座", s:"♋", c:"#A1F891"}, {n:"獅子座", s:"♌", c:"#91F8E5"}, {n:"乙女座", s:"♍", c:"#91E9F8"},
    {n:"天秤座", s:"♎", c:"#91A1F8"}, {n:"蠍座", s:"♏", c:"#E591F8"}, {n:"射手座", s:"♐", c:"#F891E9"},
    {n:"山羊座", s:"♑", c:"#F891A1"}, {n:"水瓶座", s:"♒", c:"#D1D1D1"}, {n:"魚座", s:"♓", c:"#FFB2D1"}
];

const planets = [
    {n:"太陽", s:"☉", c:"#e67e22"}, {n:"月", s:"☽", c:"#f1c40f"}, {n:"水星", s:"☿", c:"#95a5a6"},
    {n:"金星", s:"♀", c:"#e84393"}, {n:"火星", s:"♂", c:"#c0392b"}, {n:"木星", s:"♃", c:"#9b59b6"},
    {n:"土星", s:"♄", c:"#34495e"}
];

function draw() {
    const canvas = document.getElementById('cvs');
    const ctx = canvas.getContext('2d');
    document.getElementById('canvas-wrapper').style.display = 'block';

    const cx = 500, cy = 500, r = 400;
    ctx.clearRect(0,0,1000,1000);
    ctx.fillStyle = "white"; ctx.fillRect(0,0,1000,1000);

    // 1. カラー星座盤の描画
    signs.forEach((sg, i) => {
        const start = (i * 30 - 90) * Math.PI / 180;
        const end = ((i + 1) * 30 - 90) * Math.PI / 180;
        
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, start, end);
        ctx.fillStyle = sg.c + "66"; // 透明度調整
        ctx.fill();
        ctx.strokeStyle = "#ccc"; ctx.lineWidth = 1; ctx.stroke();

        // 星座記号
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(start + (15 * Math.PI / 180));
        ctx.fillStyle = "#333";
        ctx.font = "30px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(sg.s, r - 30, 10);
        ctx.restore();
    });

    // 2. ハウス線の描画 (簡易 Placidus風)
    for(let i=0; i<12; i++) {
        const ang = (i * 30 - 120) * Math.PI / 180;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + (r-60) * Math.cos(ang), cy + (r-60) * Math.sin(ang));
        ctx.strokeStyle = (i%3==0) ? "#666" : "#ddd";
        ctx.lineWidth = (i%3==0) ? 2 : 1;
        ctx.stroke();
    }

    // 3. 惑星の計算と配置
    const seed = new Date(document.getElementById('date').value).getTime();
    const pPos = planets.map((p, i) => {
        const angle = (seed / (1000000 * (i+1)) + (i*40)) % 360;
        return { ...p, ang: angle };
    });

    // アスペクト線 (赤と青)
    pPos.forEach((p1, i) => {
        pPos.forEach((p2, j) => {
            if (i >= j) return;
            const d = Math.abs(p1.ang - p2.ang) % 180;
            const r1 = (p1.ang - 90) * Math.PI / 180;
            const r2 = (p2.ang - 90) * Math.PI / 180;
            
            if (Math.abs(d-120)<8 || Math.abs(d-60)<8) {
                ctx.beginPath(); ctx.strokeStyle = "rgba(0,100,255,0.4)";
                ctx.moveTo(cx+(r-100)*Math.cos(r1), cy+(r-100)*Math.sin(r1));
                ctx.lineTo(cx+(r-100)*Math.cos(r2), cy+(r-100)*Math.sin(r2));
                ctx.stroke();
            } else if (Math.abs(d-90)<8 || Math.abs(d-180)<8) {
                ctx.beginPath(); ctx.strokeStyle = "rgba(255,0,0,0.4)";
                ctx.moveTo(cx+(r-100)*Math.cos(r1), cy+(r-100)*Math.sin(r1));
                ctx.lineTo(cx+(r-100)*Math.cos(r2), cy+(r-100)*Math.sin(r2));
                ctx.stroke();
            }
        });
    });

    // 惑星記号の描画
    pPos.forEach(p => {
        const a = (p.ang - 90) * Math.PI / 180;
        const x = cx + (r - 100) * Math.cos(a);
        const y = cy + (r - 100) * Math.sin(a);
        ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(x,y,20,0,7); ctx.fill();
        ctx.fillStyle = p.c; ctx.font = "30px sans-serif"; ctx.textAlign="center";
        ctx.fillText(p.s, x, y+10);
        ctx.fillStyle = "#333"; ctx.font = "12px sans-serif";
        ctx.fillText(p.n, x, y+35);
    });

    // 中央の空白
    ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(cx,cy,50,0,7); ctx.fill();
}

function save() {
    const a = document.createElement('a');
    a.href = document.getElementById('cvs').toDataURL();
    a.download = 'horoscope.png'; a.click();
}
</script>
</body>
</html>
